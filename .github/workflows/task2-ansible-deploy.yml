name: Task2 Ansible Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "task2/**"
      - ".github/workflows/task2-ansible-deploy.yml"
  workflow_dispatch:

jobs:
  ansible:
    runs-on: ubuntu-latest

    env:
      TARGET_HOST: ${{ secrets.TASK2_TARGET_HOST }}
      TARGET_USER: ${{ secrets.TASK2_TARGET_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.TASK2_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible python3-pip
          python3 -m pip install --user ansible-lint

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Test SSH
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${TARGET_USER}@${TARGET_HOST} "echo SSH_OK"

      - name: Generate inventory
        run: |
          mkdir -p task2/ansible/inventory
          cat > task2/ansible/inventory/hosts.ini <<EOF
          [minikube_nodes]
          target1 ansible_host=${TARGET_HOST}

          [minikube_nodes:vars]
          ansible_user=${TARGET_USER}
          ansible_ssh_private_key_file=/home/runner/.ssh/id_rsa
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          EOF

      - name: Lint playbook
        working-directory: task2/ansible
        run: ~/.local/bin/ansible-lint playbook.yml

      - name: Syntax check
        working-directory: task2/ansible
        run: ansible-playbook -i inventory/hosts.ini playbook.yml --syntax-check

      - name: Apply playbook
        working-directory: task2/ansible
        run: ansible-playbook -i inventory/hosts.ini playbook.yml
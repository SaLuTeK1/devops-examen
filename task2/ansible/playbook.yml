---
- name: Install Kubernetes tooling, Minikube and Helm
  hosts: minikube_nodes
  become: true

  vars:
    docker_users:
      - "{{ ansible_user }}"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base dependencies
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - gnupg
          - ca-certificates
          - apt-transport-https
          - conntrack
          - socat
          - ebtables
          - ethtool
        state: present
        update_cache: true

    - name: Create Docker keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      ansible.builtin.shell: |
        arch="$(dpkg --print-architecture)"
        codename="$(
          . /etc/os-release
          echo "${UBUNTU_CODENAME}"
        )"
        echo "deb [arch=${arch} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${codename} stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repo
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

    - name: Download kubectl stable version file
      ansible.builtin.get_url:
        url: https://dl.k8s.io/release/stable.txt
        dest: /tmp/kubectl-stable.txt
        mode: "0644"

    - name: Read kubectl stable version
      ansible.builtin.slurp:
        src: /tmp/kubectl-stable.txt
      register: kubectl_version_file

    - name: Set kubectl version fact
      ansible.builtin.set_fact:
        kubectl_version: "{{ kubectl_version_file.content | b64decode | trim }}"

    - name: Download kubectl binary
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"

    - name: Download Minikube binary
      ansible.builtin.get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: "0755"

    - name: Download Helm archive
      ansible.builtin.get_url:
        url: https://get.helm.sh/helm-v3.17.2-linux-amd64.tar.gz
        dest: /tmp/helm.tar.gz
        mode: "0644"

    - name: Unarchive Helm
      ansible.builtin.unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp
        remote_src: true

    - name: Install Helm binary
      ansible.builtin.copy:
        src: /tmp/linux-amd64/helm
        dest: /usr/local/bin/helm
        remote_src: true
        mode: "0755"

    - name: Start Minikube
      become: true
      become_user: "{{ ansible_user }}"
      ansible.builtin.command: >
        minikube start
        --driver={{ minikube_driver }}
        --memory={{ minikube_memory }}
        --cpus={{ minikube_cpus }}
        --profile={{ minikube_profile }}
      args:
        creates: "/home/{{ ansible_user }}/.minikube/profiles/{{ minikube_profile }}/config.json"

    - name: Verify kubectl installation
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Verify Minikube installation
      ansible.builtin.command: minikube version
      register: minikube_check
      changed_when: false

    - name: Verify Helm installation
      ansible.builtin.command: helm version
      register: helm_check
      changed_when: false

    - name: Verify Kubernetes node
      become: true
      become_user: "{{ ansible_user }}"
      ansible.builtin.command: kubectl get nodes
      register: cluster_nodes
      changed_when: false

    - name: Create Minikube proxy systemd unit
      ansible.builtin.template:
        src: templates/minikube-proxy.service.j2
        dest: /etc/systemd/system/minikube-proxy.service
        mode: "0644"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start Minikube proxy
      ansible.builtin.systemd:
        name: minikube-proxy
        enabled: true
        state: started
